<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Deck Share</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	</head>
	<body>
		<header class="share-topbar">
			<div>
				<p class="share-kicker">Interactive Deck</p>
				<h1 id="share-title">Loading deck...</h1>
				<p id="share-subtitle" class="share-subtitle"></p>
			</div>
			<div class="share-actions">
				<span id="share-counter" class="share-counter">0 / 0</span>
				<a id="share-download-pptx" href="#" download>Download PPTX</a>
				<button id="share-print" type="button">Download PDF</button>
			</div>
		</header>

		<main class="share-main">
			<button
				id="share-prev"
				class="share-nav-btn"
				type="button"
				aria-label="Previous slide"
			>
				&#10094;
			</button>
			<div id="share-deck" class="share-deck">
				<div id="share-track" class="share-track"></div>
			</div>
			<button
				id="share-next"
				class="share-nav-btn"
				type="button"
				aria-label="Next slide"
			>
				&#10095;
			</button>
		</main>

		<template id="share-slide-template">
			<section class="share-slide">
				<div class="share-slide-frame"></div>
			</section>
		</template>

		<script type="module" src="/share.ts"></script>
	</body>
</html>
