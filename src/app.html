<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon.ico"
			type="image/x-icon"
			sizes="16x16 32x32 48x48"
		>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml">
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
		<meta name="color-scheme" content="dark light">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Pacifico&display=swap"
			rel="stylesheet"
		>
		<!-- Default OG / Twitter meta. Route-level <svelte:head> may override. -->
		<meta
			name="description"
			content="AI-powered pitch deck generator — set client name + URL, let AI fill the deck, export to PowerPoint, PDF, or shareable link."
		>
		<meta property="og:type" content="website">
		<meta property="og:site_name" content="Notso AI Pitch Deck Studio">
		<meta property="og:title" content="Notso AI Pitch Deck Studio">
		<meta
			property="og:description"
			content="AI-powered pitch deck generator — set client name + URL, let AI fill the deck, export to PowerPoint, PDF, or shareable link."
		>
		<meta property="og:url" content="https://pitch.kjanat.com">
		<meta property="og:image" content="https://pitch.kjanat.com/social/deck-share-card.png">
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="Notso AI Pitch Deck Studio">
		<meta
			name="twitter:description"
			content="AI-powered pitch deck generator — set client name + URL, let AI fill the deck, export to PowerPoint, PDF, or shareable link."
		>
		<meta name="twitter:image" content="https://pitch.kjanat.com/social/deck-share-card.png">
		%sveltekit.head%
		<script>
			// FOUC prevention: apply theme before first paint
			(function() {
				var saved;
				try {
					saved = localStorage.getItem('theme');
				} catch {
					saved = null;
				}

				var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var resolved = saved === 'light' || saved === 'dark'
					? saved
					: systemDark
					? 'dark'
					: 'light';

				document.documentElement.setAttribute('data-theme', resolved);
				document.documentElement.classList.toggle('dark', resolved === 'dark');
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
